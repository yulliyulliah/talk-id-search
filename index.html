const bizMap = {};

bizList.forEach((biz, i) => {
    if (biz && idList[i]) {
        bizMap[biz] = idList[i];
    }
});

function searchId() {
    const input = document.getElementById('bizInput').value.trim();
    const resultDiv = document.getElementById('result');

    if (!input) {
        resultDiv.innerHTML = `<span style="color:#ff4d4f;">도메인정보를 입력해주세요.</span>`;
        return;
    }

    if (bizMap[input]) {
        resultDiv.innerHTML = `
            조회된 톡채널 ID:<br>
            <span style="font-size:24px; color:#1890ff;">
                ${bizMap[input]}
            </span>
        `;
    } else {
        resultDiv.innerHTML = `<span style="color:#ff4d4f;">등록되지 않은 도메인정보입니다.</span>`;
    }
}
