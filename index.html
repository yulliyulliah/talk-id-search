// 숫자만 남겨서 Map 구조로 저장 (가장 빠르고 안전)
const bizMap = {};

rawBiz.trim().split(/\s+/).forEach((biz, i) => {
    const cleanBiz = biz.replace(/[^0-9]/g, "");
    const cleanId = rawId.trim().split(/\s+/)[i];

    if (cleanBiz && cleanId) {
        bizMap[cleanBiz] = cleanId;
    }
});

function searchId() {
    const rawInput = document.getElementById('bizInput').value.trim();
    const resultDiv = document.getElementById('result');

    if (!rawInput) {
        resultDiv.innerHTML = `<span style="color:#ff4d4f;">스토어ID를 입력해주세요.</span>`;
        return;
    }

    const cleanInput = rawInput.replace(/[^0-9]/g, "");

    if (bizMap[cleanInput]) {
        resultDiv.innerHTML = `
            조회된 톡채널 ID:<br>
            <span style="font-size:24px; color:#1890ff;">
                ${bizMap[cleanInput]}
            </span>
        `;
    } else {
        resultDiv.innerHTML = `<span style="color:#ff4d4f;">등록되지 않은 스토어ID입니다.</span>`;
    }
}
</script>
